<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100칸 수학 게임</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Floating math decorations -->
    <div class="bg-decorations" aria-hidden="true">
        <span class="deco deco-1">➕</span>
        <span class="deco deco-2">✖️</span>
        <span class="deco deco-3">➖</span>
        <span class="deco deco-4">🔢</span>
        <span class="deco deco-5">➗</span>
        <span class="deco deco-6">🧮</span>
        <span class="deco deco-7">⭐</span>
        <span class="deco deco-8">7</span>
        <span class="deco deco-9">3</span>
        <span class="deco deco-10">=</span>
        <span class="deco deco-11">9</span>
        <span class="deco deco-12">📐</span>
    </div>

    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="title-wrap">
                <span class="title-emoji">🧮</span>
                <h1>100칸 수학</h1>
                <span class="title-emoji">✨</span>
            </div>
            <p class="subtitle">빠르고 정확하게 빈칸을 채워 보아요!</p>

            <div class="settings">
                <div class="setting-group">
                    <label><span class="label-icon">📏</span> 칸수 선택</label>
                    <div class="radio-group" id="size-options">
                        <input type="radio" id="s10" name="size" value="10" checked>
                        <label for="s10">10칸 (2x5)</label>
                        <input type="radio" id="s25" name="size" value="25">
                        <label for="s25">25칸 (5x5)</label>
                        <input type="radio" id="s100" name="size" value="100">
                        <label for="s100">100칸 (10x10)</label>
                    </div>
                </div>

                <div class="setting-group">
                    <label><span class="label-icon">🎯</span> 연산 선택</label>
                    <div class="radio-group" id="op-options">
                        <input type="radio" id="op-add" name="operator" value="+" checked>
                        <label for="op-add">➕ 덧셈</label>
                        <input type="radio" id="op-sub" name="operator" value="-">
                        <label for="op-sub">➖ 뺄셈</label>
                        <input type="radio" id="op-mul" name="operator" value="x">
                        <label for="op-mul">✖️ 곱셈</label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="start-btn" class="primary-btn">🚀 게임 시작</button>
                <button id="records-btn" class="secondary-btn">📊 내 기록 보기</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="info">
                    <span id="game-mode-label">100칸 (+)</span>
                </div>
                <div class="timer" id="timer">00:00.000</div>
                <div class="controls">
                    <button id="giveup-btn" class="danger-btn">포기</button>
                </div>
            </div>

            <div class="board-container">
                <div id="board" class="board"></div>
            </div>
        </div>

        <!-- Records Modal -->
        <div id="records-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-records">&times;</span>
                <h2>🏆 내 최고 기록 & 성장 일기</h2>

                <div class="record-filter">
                    <select id="record-mode-select">
                        <option value="10_+">10칸 덧셈 (+)</option>
                        <option value="10_-">10칸 뺄셈 (-)</option>
                        <option value="10_x">10칸 곱셈 (x)</option>
                        <option value="25_+">25칸 덧셈 (+)</option>
                        <option value="25_-">25칸 뺄셈 (-)</option>
                        <option value="25_x">25칸 곱셈 (x)</option>
                        <option value="100_+">100칸 덧셈 (+)</option>
                        <option value="100_-">100칸 뺄셈 (-)</option>
                        <option value="100_x">100칸 곱셈 (x)</option>
                    </select>
                </div>

                <div class="best-score" id="best-score-display">
                    <span class="trophy">🥇</span> 최고 기록: <span id="best-time">기록 없음</span>
                </div>

                <div class="chart-container">
                    <canvas id="recordChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Result Modal -->
        <div id="result-modal" class="modal">
            <div class="modal-content result-content">
                <div class="celebrate">🎉</div>
                <h2>참 잘했어요!</h2>
                <div class="result-time" id="final-time">00:00.000</div>
                <p id="result-message">수고했어요! 조금씩 더 빨라질 수 있어요. 💪</p>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                    <button id="retry-btn" class="primary-btn">🔁 다시 하기</button>
                    <button id="home-btn" class="secondary-btn">🏠 처음으로</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
