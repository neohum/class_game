<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>몇 시일까요 × 4</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell-front: #38bdf8;
    --cell-front-hover: #7dd3fc;
    --cell-back: #fbbf24;
    --cell-back-hover: #fcd34d;
    --text-dark: #0f172a;
    --text-light: #e2e8f0;
    --accent: #34d399;
    --wrong: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text-light);
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;      /* 스크롤/줌 제스처 판정 지연 제거 → 터치 즉시 반응 */
    overflow: hidden;
  }
  #games {
    display: flex;
    height: 100vh;
    gap: 8px;
    padding: 8px;
  }
  .game {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    background: var(--panel);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    overflow: hidden;
  }
  .game h2 {
    font-size: 1rem;
    letter-spacing: 1px;
    margin-top: auto; /* 제목·HUD·보드를 패널 바닥 쪽으로 밀어내림 */
    margin-bottom: 6px;
    color: #94a3b8;
  }
  .game h2 span { color: var(--cell-front); }
  .hud {
    display: flex;
    gap: 6px;
    align-items: stretch;
    margin-bottom: 8px;
    width: 100%;
    justify-content: center;
  }
  .hud .box {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 8px;
    padding: 4px 10px;
    text-align: center;
    min-width: 0;
    flex: 1 1 0;
    max-width: 110px;
  }
  .hud .label {
    font-size: 0.6rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .hud .value {
    font-size: clamp(0.9rem, 1.6vw, 1.3rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hud .value.prog { color: var(--accent); }
  .clock {
    width: 100%;
    max-width: min(16vw, 34vh);
    margin-bottom: 10px;
    display: block;
  }
  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
    max-width: min(20vw, 42vh);
    margin-bottom: 4px;
  }
  .choice {
    border: none;
    border-radius: 12px;
    background: var(--cell-front);
    color: var(--text-dark);
    min-height: clamp(48px, 7vh, 64px);
    font-size: clamp(0.95rem, 1.7vw, 1.4rem);
    font-weight: 800;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    touch-action: none;
    transition: background 0.15s;
    white-space: nowrap;
    padding: 4px 2px;
  }
  .choice:hover { background: var(--cell-front-hover); }
  .choice.shake { animation: shake 0.25s; background: var(--wrong); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(3px);
    border-radius: 14px;
    cursor: pointer;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .hidden { display: none; }
  .overlay .title { font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 800; text-align: center; }
  .overlay .result {
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(--cell-back);
    font-variant-numeric: tabular-nums;
  }
  .overlay .sub { color: #94a3b8; font-size: 0.9rem; text-align: center; padding: 0 10px; }
  .overlay .newrecord {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .overlay .big {
    background: var(--accent);
    color: var(--text-dark);
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .overlay .tap { color: #64748b; font-size: 0.75rem; }

  /* players=1: 패널 하나가 뷰포트 전체(≈기존 25vw 패널 폭) → vw 항을 약 4배로 스케일 */
  .players-1 .hud .value { font-size: clamp(0.9rem, 6.4vw, 1.3rem); }
  .players-1 .clock { max-width: min(64%, 34vh); }
  .players-1 .choices { max-width: min(80%, 42vh); }
  .players-1 .choice { font-size: clamp(0.95rem, 6.8vw, 1.4rem); }
  .players-1 .overlay .title { font-size: clamp(1.2rem, 10vw, 2rem); }
  .players-1 .overlay .result { font-size: clamp(1.6rem, 14vw, 2.8rem); }
  .players-1 .overlay .big { font-size: clamp(1rem, 7.2vw, 1.2rem); }
</style>
</head>
<body>

<div id="games"></div>

<script>
(() => {
  const BEST_KEY = 'clock-read-best';
  const TOTAL = 10;
  const PLAYERS = Math.max(1, Math.min(6, parseInt(new URLSearchParams(location.search).get('players'), 10) || 4));

  /* ?players= 없이 열면 인원수 선택(1·2·6인용)부터 — 고르면 그 인원으로 다시 연다 */
  if (!new URLSearchParams(location.search).has('players')) {
    const sel = document.createElement('div');
    sel.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:14px;padding:0 16px 6vh;background:rgba(15,23,42,0.97);color:#e2e8f0;';
    sel.innerHTML = '<div style="font-size:clamp(1.3rem,3vw,2.2rem);font-weight:800;">몇 명이서 할까요?</div>'
      + '<div style="display:flex;gap:12px;width:100%;max-width:720px;">'
      + [1, 2, 6].map(n => '<button data-p="' + n + '" style="flex:1;border:none;border-radius:14px;background:#38bdf8;color:#0f172a;font-family:inherit;font-weight:800;font-size:clamp(1rem,2.4vw,1.6rem);padding:clamp(14px,3vh,26px) 4px;cursor:pointer;touch-action:none;">' + n + '인용</button>').join('')
      + '</div>';
    document.body.appendChild(sel);
    sel.addEventListener('pointerdown', e => {
      const btn = e.target.closest('[data-p]');
      if (btn) location.search = 'players=' + btn.dataset.p;
    });
  }
  document.body.classList.add('players-' + PLAYERS);

  /* 우클릭 및 롱프레스 컨텍스트 메뉴 차단 */
  document.addEventListener('contextmenu', e => e.preventDefault());
  /* 드래그/텍스트 선택으로 인한 입력 방해 차단 */
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function ri(n) { return Math.floor(Math.random() * n); }

  function loadBest() {
    const b = localStorage.getItem(BEST_KEY);
    return b ? Number(b) : null;
  }

  function formatTime(ms) {
    return (ms / 1000).toFixed(2);
  }

  function label(h, m30) {
    return m30 ? h + '시 30분' : h + '시';
  }

  function wrapHour(h) {
    return ((h - 1 + 12) % 12) + 1;
  }

  /* 시계 SVG는 한 번만 만들고, 이후에는 바늘 각도만 갱신 */
  function buildClockSVG() {
    let ticks = '';
    for (let i = 0; i < 12; i++) {
      const major = i % 3 === 0;
      ticks += '<line x1="50" y1="7" x2="50" y2="' + (major ? 13 : 11) + '"'
        + ' stroke="' + (major ? '#0f172a' : '#64748b') + '"'
        + ' stroke-width="' + (major ? 2.6 : 1.8) + '" stroke-linecap="round"'
        + ' transform="rotate(' + (i * 30) + ' 50 50)"/>';
    }
    const nums =
      '<text x="50" y="24" font-size="11" font-weight="800" fill="#0f172a" text-anchor="middle">12</text>' +
      '<text x="80" y="54" font-size="11" font-weight="800" fill="#0f172a" text-anchor="middle">3</text>' +
      '<text x="50" y="84" font-size="11" font-weight="800" fill="#0f172a" text-anchor="middle">6</text>' +
      '<text x="20" y="54" font-size="11" font-weight="800" fill="#0f172a" text-anchor="middle">9</text>';
    return '<svg class="clock" viewBox="0 0 100 100" aria-hidden="true">'
      + '<circle cx="50" cy="50" r="47" fill="#f1f5f9" stroke="#38bdf8" stroke-width="3"/>'
      + ticks + nums
      + '<line class="hand-hour" x1="50" y1="50" x2="50" y2="30" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>'
      + '<line class="hand-minute" x1="50" y1="50" x2="50" y2="15" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>'
      + '<circle cx="50" cy="50" r="3.2" fill="#0f172a"/>'
      + '</svg>';
  }

  function createGame(root, index) {
    root.className = 'game';
    root.innerHTML = `
      <h2>${PLAYERS === 1 ? '' : 'PLAYER ' + (index + 1) + ' · '}몇 시<span>일까요</span></h2>
      <div class="hud">
        <div class="box"><div class="label">진행</div><div class="value prog">0/${TOTAL}</div></div>
        <div class="box"><div class="label">시간</div><div class="value time">0.00</div></div>
        <div class="box"><div class="label">최고</div><div class="value best">-</div></div>
      </div>
      ${buildClockSVG()}
      <div class="choices"></div>
      <div class="overlay">
        <div class="title">몇 시일까요</div>
        <div class="result hidden"></div>
        <div class="newrecord" style="display:none">🎉 신기록!</div>
        <div class="sub">시계를 보고 몇 시인지 골라요!</div>
        <button class="big">게임 시작</button>
        <div class="tap">화면 아무 곳이나 터치해도 시작</div>
      </div>`;

    const hourHand = root.querySelector('.hand-hour');
    const minuteHand = root.querySelector('.hand-minute');
    const choicesEl = root.querySelector('.choices');
    const progEl = root.querySelector('.value.prog');
    const timerEl = root.querySelector('.value.time');
    const bestEl = root.querySelector('.value.best');
    const overlay = root.querySelector('.overlay');
    const overlayTitle = overlay.querySelector('.title');
    const overlayResult = overlay.querySelector('.result');
    const overlayRecord = overlay.querySelector('.newrecord');
    const overlaySub = overlay.querySelector('.sub');
    const startBtn = overlay.querySelector('.big');

    const choiceBtns = [];
    for (let i = 0; i < 4; i++) {
      const b = document.createElement('button');
      b.className = 'choice';
      choicesEl.appendChild(b);
      choiceBtns.push(b);
    }

    let done = 0;
    let answerLabel = '';
    let prevH = 0;
    let prevM = -1;
    let startTime = 0;
    let timerId = null;
    let playing = false;

    function refreshBest() {
      const b = loadBest();
      bestEl.textContent = b !== null ? b.toFixed(2) : '-';
    }

    function tick() {
      timerEl.textContent = formatTime(performance.now() - startTime);
    }

    /* 바늘 각도만 갱신: 30분이면 시침이 두 숫자의 중간! */
    function setHands(h, m30) {
      const hourAngle = h * 30 + (m30 ? 15 : 0);
      const minAngle = m30 ? 180 : 0;
      hourHand.setAttribute('transform', 'rotate(' + hourAngle + ' 50 50)');
      minuteHand.setAttribute('transform', 'rotate(' + minAngle + ' 50 50)');
    }

    function makeProblem() {
      let h, m30;
      do {
        h = 1 + ri(12);
        m30 = ri(2) === 1;
      } while (h === prevH && (m30 ? 30 : 0) === prevM); /* 직전 문제와 다르게 */
      prevH = h;
      prevM = m30 ? 30 : 0;

      setHands(h, m30);
      answerLabel = label(h, m30);

      /* 오답 후보: 같은 시의 다른 분 + 인접 시의 정각/30분 */
      const cands = shuffle([
        label(h, !m30),
        label(wrapHour(h + 1), false),
        label(wrapHour(h + 1), true),
        label(wrapHour(h - 1), false),
        label(wrapHour(h - 1), true)
      ]);
      const wrongs = [];
      for (const c of cands) {
        if (wrongs.length === 3) break;
        if (c !== answerLabel && !wrongs.includes(c)) wrongs.push(c);
      }

      const opts = shuffle([answerLabel, ...wrongs]);
      choiceBtns.forEach((b, i) => {
        b.textContent = opts[i];
        b.dataset.val = opts[i];
        b.classList.remove('shake');
      });
    }

    function onChoice(btn) {
      if (!playing) return;
      if (btn.dataset.val !== answerLabel) {
        btn.classList.remove('shake');
        void btn.offsetWidth; /* 애니메이션 재시작 트릭 */
        btn.classList.add('shake');
        return;
      }

      done++;
      progEl.textContent = done + '/' + TOTAL;

      if (done >= TOTAL) {
        const elapsed = performance.now() - startTime;
        clearInterval(timerId);
        timerEl.textContent = formatTime(elapsed);
        finish(elapsed);
      } else {
        makeProblem();
      }
    }

    /* pointerdown 위임: 손가락이 닿는 순간 처리 (멀티터치에서도 포인터마다 독립 발생) */
    choicesEl.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return; /* 마우스는 좌클릭만 */
      const btn = e.target.closest('.choice');
      if (!btn) return;
      e.preventDefault(); /* 합성 click/더블탭 줌 등 후속 이벤트 방지 */
      onChoice(btn);
    });

    function start() {
      done = 0;
      progEl.textContent = '0/' + TOTAL;
      timerEl.textContent = '0.00';
      refreshBest();
      makeProblem();
      overlay.classList.add('hidden');
      playing = true;
      startTime = performance.now();
      clearInterval(timerId);
      timerId = setInterval(tick, 31);
    }

    function finish(elapsed) {
      playing = false;

      const prevBest = loadBest();
      const secs = elapsed / 1000;
      const isRecord = prevBest === null || secs < prevBest;
      if (isRecord) localStorage.setItem(BEST_KEY, secs.toFixed(2));
      refreshBest();

      overlayTitle.textContent = '완료!';
      overlayResult.textContent = secs.toFixed(2) + '초';
      overlayResult.classList.remove('hidden');
      overlayRecord.style.display = isRecord ? 'block' : 'none';
      overlaySub.textContent = isRecord ? '' : '최고 기록: ' + loadBest().toFixed(2) + '초';
      startBtn.textContent = '다시 하기';
      overlay.classList.remove('hidden');
    }

    /* 오버레이 전체가 시작 버튼: 이 패널만 시작/재시작 */
    overlay.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      start();
    });

    refreshBest();
    makeProblem(); /* 시작 전 미리보기 */
  }

  const container = document.getElementById('games');
  for (let i = 0; i < PLAYERS; i++) {
    const panel = document.createElement('div');
    container.appendChild(panel);
    createGame(panel, i);
  }
})();
</script>
</body>
</html>
