<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 찾기 게임 (Find a Word)</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Menu Screen -->
    <div id="menu-screen" class="menu-container">
        <div class="menu-card glass">
            <h1>단어 찾기</h1>
            <p>난이도를 선택하세요!</p>
            
            <div class="level-buttons">
                <button class="btn btn-level" data-level="1">1단계 (5x5)</button>
                <button class="btn btn-level" data-level="2">2단계 (7x7)</button>
                <button class="btn btn-level" data-level="3">3단계 (10x10)</button>
            </div>

            <a href="/" class="btn secondary btn-back-home" style="margin-top: 2rem; display: inline-block; text-decoration: none;">이전 화면으로 가기</a>
        </div>
    </div>

    <!-- Main Game Area -->
    <div id="game-screen" class="app-container hidden">
        <!-- Header / Controls -->
        <header class="game-header">
            <div class="logo">
                <h1>단어 찾기</h1>
                <p>글자를 순서대로 눌러 단어를 완성하세요!</p>
            </div>
            <div class="game-controls">
                <button id="btn-pause" class="btn secondary">일시정지</button>
                <button id="btn-new-game" class="btn primary">다시 시작</button>
                <button id="btn-back-menu" class="btn secondary">이전 화면</button>
            </div>
        </header>

        <main class="game-content">
            <!-- Left: Grid -->
            <section class="board-section">
                <div id="game-board" class="grid-container">
                    <!-- JavaScript will generate cells here -->
                </div>
                
                <!-- Pause overlay -->
                <div id="pause-overlay" class="overlay hidden">
                    <h2>일시 정지</h2>
                    <p>게임이 잠시 중단되었습니다.</p>
                    <button id="btn-resume" class="btn primary">계속 하기</button>
                    <button id="btn-pause-back-menu" class="btn secondary" style="margin-top: 10px;">이전 화면</button>
                </div>


            </section>

            <!-- Right: Info Panel -->
            <section class="info-section">
                <!-- Current Selection -->
                <div class="panel current-selection-panel">
                    <h3>현재 선택한 글자</h3>
                    <div id="current-selection-display" class="selection-display">
                        <span class="placeholder">글자를 클릭하세요</span>
                    </div>
                </div>

                <!-- Found Words Log -->
                <div class="panel found-words-panel">
                    <h3>찾은 단어 뜻 (<span id="found-count">0</span>)</h3>
                    <div id="found-words-list" class="words-list">
                        <!-- Found words will appear here -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
