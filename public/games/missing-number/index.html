<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>징검다리 수 채우기 × 4</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell-front: #38bdf8;
    --cell-front-hover: #7dd3fc;
    --cell-back: #fbbf24;
    --cell-back-hover: #fcd34d;
    --text-dark: #0f172a;
    --text-light: #e2e8f0;
    --accent: #34d399;
    --wrong: #f87171;
    --stone: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text-light);
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;      /* 스크롤/줌 제스처 판정 지연 제거 → 터치 즉시 반응 */
    overflow: hidden;
  }
  #games {
    display: flex;
    height: 100vh;
    gap: 8px;
    padding: 8px;
  }
  .game {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    background: var(--panel);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    overflow: hidden;
  }
  .game h2 {
    font-size: 1rem;
    letter-spacing: 1px;
    margin-top: auto; /* 제목·HUD·보드를 패널 바닥 쪽으로 밀어내림 */
    margin-bottom: 6px;
    color: #94a3b8;
  }
  .game h2 span { color: var(--cell-front); }
  .hud {
    display: flex;
    gap: 6px;
    align-items: stretch;
    margin-bottom: 8px;
    width: 100%;
    justify-content: center;
  }
  .hud .box {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 8px;
    padding: 4px 10px;
    text-align: center;
    min-width: 0;
    flex: 1 1 0;
    max-width: 110px;
  }
  .hud .label {
    font-size: 0.6rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .hud .value {
    font-size: clamp(0.9rem, 1.6vw, 1.3rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hud .value.progress { color: var(--accent); }
  .stones {
    display: flex;
    gap: 5px;
    width: 100%;
    max-width: min(22vw, 46vh);
    justify-content: center;
    padding-top: 34px; /* 개구리 연출 공간 */
    margin-bottom: 14px;
  }
  .stone {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    aspect-ratio: 1 / 0.85; /* 납작한 타원 돌 */
    border-radius: 50%;
    background: var(--stone);
    color: var(--text-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.9rem, 2vw, 1.6rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    box-shadow: inset 0 -4px 0 rgba(15, 23, 42, 0.25);
  }
  .stone.q {
    background: var(--cell-back);
    color: var(--text-dark);
  }
  .stone.done { background: var(--accent); }
  .stone .frog {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1.1rem, 2.4vw, 1.8rem);
    pointer-events: none;
    animation: hop 0.5s;
  }
  @keyframes hop {
    0% { transform: translate(-50%, 14px) scale(0.4); opacity: 0; }
    60% { transform: translate(-50%, -8px) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
  }
  .choices {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: min(22vw, 46vh);
    justify-content: center;
  }
  .choice {
    flex: 1 1 0;
    min-width: 0;
    min-height: 56px;
    border: none;
    border-radius: 14px;
    background: var(--cell-front);
    color: var(--text-dark);
    font-size: clamp(1.3rem, 2.8vw, 2.2rem);
    font-weight: 800;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    padding: 12px 0;
    cursor: pointer;
    touch-action: none;
    transition: background 0.15s;
  }
  .choice:hover { background: var(--cell-front-hover); }
  .choice.shake { animation: shake 0.25s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(3px);
    border-radius: 14px;
    cursor: pointer;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .hidden { display: none; }
  .overlay .title { font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 800; }
  .overlay .result {
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(--cell-back);
    font-variant-numeric: tabular-nums;
  }
  .overlay .sub { color: #94a3b8; font-size: 0.9rem; text-align: center; }
  .overlay .newrecord {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .overlay .big {
    background: var(--accent);
    color: var(--text-dark);
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .overlay .tap { color: #64748b; font-size: 0.75rem; }
  /* players=1: 패널 폭 ≈ 뷰포트 폭(좁은 iframe)이므로 vw 기반 크기를 약 4배로 보정 */
  .players-1 .hud .value { font-size: clamp(0.9rem, 6.4vw, 1.3rem); }
  .players-1 .stones { max-width: min(88%, 46vh); }
  .players-1 .stone { font-size: clamp(0.9rem, 8vw, 1.6rem); }
  .players-1 .stone .frog { font-size: clamp(1.1rem, 9.6vw, 1.8rem); }
  .players-1 .choices { max-width: min(88%, 46vh); }
  .players-1 .choice { font-size: clamp(1.3rem, 11.2vw, 2.2rem); }
  .players-1 .overlay .title { font-size: clamp(1.2rem, 10vw, 2rem); }
  .players-1 .overlay .result { font-size: clamp(1.6rem, 14vw, 2.8rem); }
  .players-1 .overlay .big { font-size: clamp(1rem, 7.2vw, 1.2rem); }
</style>
</head>
<body>

<div id="games"></div>

<script>
(() => {
  const BEST_KEY = 'missing-number-best';
  const TOTAL = 10;      /* 총 문제 수 */
  const STONES = 5;      /* 징검다리 돌 개수 */
  const CELEBRATE = 650; /* 성공 연출 시간(ms) */

  /* ?players=N (1~4): 랜덤 게임 허브가 1인용 좁은 iframe으로 로드할 때 사용 */
  const PLAYERS = Math.max(1, Math.min(4, parseInt(new URLSearchParams(location.search).get('players'), 10) || 4));
  document.body.classList.add('players-' + PLAYERS);

  /* 우클릭 및 롱프레스 컨텍스트 메뉴 차단 */
  document.addEventListener('contextmenu', e => e.preventDefault());
  /* 드래그/텍스트 선택으로 인한 입력 방해 차단 */
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function loadBest() {
    const b = localStorage.getItem(BEST_KEY);
    return b ? Number(b) : null;
  }

  function formatTime(ms) {
    return (ms / 1000).toFixed(2);
  }

  function createGame(root, index) {
    root.className = 'game';
    const heading = PLAYERS === 1 ? '<span>징검다리</span> 수' : `PLAYER ${index + 1} · <span>징검다리</span> 수`;
    root.innerHTML = `
      <h2>${heading}</h2>
      <div class="hud">
        <div class="box"><div class="label">진행</div><div class="value progress">0/${TOTAL}</div></div>
        <div class="box"><div class="label">시간</div><div class="value time">0.00</div></div>
        <div class="box"><div class="label">최고</div><div class="value best">-</div></div>
      </div>
      <div class="stones"></div>
      <div class="choices"></div>
      <div class="overlay">
        <div class="title">징검다리 수 채우기</div>
        <div class="result hidden"></div>
        <div class="newrecord" style="display:none">🎉 신기록!</div>
        <div class="sub">? 돌에 들어갈 수를 골라요!</div>
        <button class="big">게임 시작</button>
        <div class="tap">화면 아무 곳이나 터치해도 시작</div>
      </div>`;

    const stonesEl = root.querySelector('.stones');
    const choicesEl = root.querySelector('.choices');
    const progressEl = root.querySelector('.value.progress');
    const timerEl = root.querySelector('.value.time');
    const bestEl = root.querySelector('.value.best');
    const overlay = root.querySelector('.overlay');
    const overlayTitle = overlay.querySelector('.title');
    const overlayResult = overlay.querySelector('.result');
    const overlayRecord = overlay.querySelector('.newrecord');
    const overlaySub = overlay.querySelector('.sub');
    const startBtn = overlay.querySelector('.big');

    let answer = 0;
    let solved = 0;
    let locked = false; /* 성공 연출 중 입력 잠금 */
    let startTime = 0;
    let timerId = null;
    let playing = false;

    function refreshBest() {
      const b = loadBest();
      bestEl.textContent = b !== null ? b.toFixed(2) : '-';
    }

    function tick() {
      timerEl.textContent = formatTime(performance.now() - startTime);
    }

    function newQuestion() {
      const start = 1 + Math.floor(Math.random() * (50 - STONES + 1)); /* 1~46 */
      const missing = Math.floor(Math.random() * STONES);
      answer = start + missing;

      stonesEl.innerHTML = '';
      for (let i = 0; i < STONES; i++) {
        const stone = document.createElement('div');
        stone.className = 'stone' + (i === missing ? ' q' : '');
        stone.textContent = i === missing ? '?' : String(start + i);
        stonesEl.appendChild(stone);
      }

      /* 보기 3개: 정답 + 근접 오답 2개 (±1, ±2 중에서, 1~50 범위, 중복 없음) */
      const near = shuffle(
        [answer - 2, answer - 1, answer + 1, answer + 2].filter(n => n >= 1 && n <= 50)
      ).slice(0, 2);
      const options = shuffle([answer, ...near]);

      choicesEl.innerHTML = '';
      options.forEach(n => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = n;
        btn.dataset.v = n;
        choicesEl.appendChild(btn);
      });
    }

    function shakeIt(el) {
      el.classList.remove('shake');
      void el.offsetWidth; /* 애니메이션 재시작 트릭 */
      el.classList.add('shake');
    }

    function onChoice(btn) {
      if (!playing || locked) return;
      if (Number(btn.dataset.v) !== answer) { /* 오답 → 보기 버튼 shake */
        shakeIt(btn);
        return;
      }

      /* 정답: ? 돌 채우고 개구리 연출 */
      locked = true;
      const qStone = stonesEl.querySelector('.stone.q');
      qStone.textContent = answer;
      qStone.classList.remove('q');
      qStone.classList.add('done');
      const frog = document.createElement('span');
      frog.className = 'frog';
      frog.textContent = '🐸';
      qStone.appendChild(frog);

      solved++;
      progressEl.textContent = solved + '/' + TOTAL;

      if (solved >= TOTAL) {
        /* 완료 시각은 마지막 정답 순간 기준으로 기록 */
        playing = false;
        clearInterval(timerId);
        const elapsed = performance.now() - startTime;
        timerEl.textContent = formatTime(elapsed);
        setTimeout(() => finish(elapsed), CELEBRATE);
        return;
      }
      setTimeout(() => {
        newQuestion();
        locked = false;
      }, CELEBRATE);
    }

    /* pointerdown 위임: 손가락이 닿는 순간 처리, 멀티터치에서 포인터마다 독립 발생 */
    choicesEl.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return; /* 마우스는 좌클릭만 */
      const btn = e.target.closest('.choice');
      if (!btn) return;
      e.preventDefault(); /* 합성 click/더블탭 줌 등 후속 이벤트 방지 */
      onChoice(btn);
    });

    function start() {
      solved = 0;
      locked = false;
      progressEl.textContent = '0/' + TOTAL;
      timerEl.textContent = '0.00';
      refreshBest();
      newQuestion();
      overlay.classList.add('hidden');
      playing = true;
      startTime = performance.now();
      clearInterval(timerId);
      timerId = setInterval(tick, 31);
    }

    function finish(elapsed) {
      const prevBest = loadBest();
      const secs = elapsed / 1000;
      const isRecord = prevBest === null || secs < prevBest;
      if (isRecord) localStorage.setItem(BEST_KEY, secs.toFixed(2));
      refreshBest();

      overlayTitle.textContent = '완료!';
      overlayResult.textContent = secs.toFixed(2) + '초';
      overlayResult.classList.remove('hidden');
      overlayRecord.style.display = isRecord ? 'block' : 'none';
      overlaySub.textContent = isRecord ? '' : '최고 기록: ' + loadBest().toFixed(2) + '초';
      startBtn.textContent = '다시 하기';
      overlay.classList.remove('hidden');
    }

    /* 오버레이 전체가 시작 버튼: 끝난 즉시 아무 곳이나 눌러 재시작 */
    overlay.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      start();
    });

    refreshBest();
    newQuestion(); /* 시작 전 미리보기 */
  }

  const container = document.getElementById('games');
  for (let i = 0; i < PLAYERS; i++) {
    const panel = document.createElement('div');
    container.appendChild(panel);
    createGame(panel, i);
  }
})();
</script>
</body>
</html>
