<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#8b5cf6"/>

  <!-- Left Card (Flipped, displaying number 36) -->
  <g transform="translate(18, 20) rotate(-10)">
    <rect width="28" height="42" rx="4" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
    <text x="14" y="25" font-family="Segoe UI, sans-serif" font-size="14" font-weight="900" fill="#064e3b" text-anchor="middle">36</text>
    <circle cx="6" cy="6" r="2" fill="#10b981"/>
    <circle cx="22" cy="36" r="2" fill="#10b981"/>
  </g>

  <!-- Right Card (Hidden, displaying '?') -->
  <g transform="translate(52, 22) rotate(12)">
    <rect width="28" height="42" rx="4" fill="#0284c7" stroke="#ffffff" stroke-width="1.5"/>
    <text x="14" y="27" font-family="Segoe UI, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">?</text>
    <!-- Pattern details -->
    <line x1="4" y1="4" x2="24" y2="4" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="4" y1="38" x2="24" y2="38" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>

  <!-- Brain/Memory Spark decoration below -->
  <path d="M 50 78 A 8 8 0 0 0 50 64 A 8 8 0 0 0 50 78 Z" fill="none" stroke="#fef08a" stroke-width="2"/>
  <line x1="50" y1="60" x2="50" y2="54" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="88" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="71" x2="34" y2="71" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="71" x2="66" y2="71" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
</svg>
