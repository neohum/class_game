<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>규칙 찾기 × 4</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell-front: #38bdf8;
    --cell-back: #fbbf24;
    --text-dark: #0f172a;
    --text-light: #e2e8f0;
    --accent: #34d399;
    --wrong: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text-light);
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    overflow: hidden;
  }
  #games {
    display: flex;
    height: 100vh;
    gap: 8px;
    padding: 8px;
  }
  .game {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    background: var(--panel);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    overflow: hidden;
  }
  .game h2 {
    font-size: 1rem;
    letter-spacing: 1px;
    margin-top: auto; /* 제목·HUD·보드를 패널 바닥 쪽으로 밀어내림 */
    margin-bottom: 6px;
    color: #94a3b8;
  }
  .game h2 span { color: var(--cell-front); }
  .hud {
    display: flex;
    gap: 6px;
    align-items: stretch;
    margin-bottom: 8px;
    width: 100%;
    justify-content: center;
  }
  .hud .box {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 8px;
    padding: 4px 10px;
    text-align: center;
    min-width: 0;
    flex: 1 1 0;
    max-width: 110px;
  }
  .hud .label {
    font-size: 0.6rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .hud .value {
    font-size: clamp(0.9rem, 1.6vw, 1.3rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hud .value.prog { color: var(--accent); }
  .prompt {
    font-size: clamp(0.95rem, 1.7vw, 1.3rem);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
  }
  .prompt span { color: var(--cell-back); }
  .seq {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    width: 100%;
    margin-bottom: 12px;
    min-height: clamp(34px, 3.4vw, 52px);
  }
  .tok {
    width: clamp(34px, 3.4vw, 52px);
    height: clamp(34px, 3.4vw, 52px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.3rem, 2.4vw, 2rem);
    background: rgba(15, 23, 42, 0.6);
    border-radius: 10px;
  }
  .tok.slot {
    background: transparent;
    border: 2px dashed #64748b;
    color: #94a3b8;
    font-weight: 800;
  }
  .tok.slot.filled {
    border-color: var(--accent);
    animation: pop 0.4s;
  }
  @keyframes pop {
    0% { transform: scale(0.2); }
    60% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .choices {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .choice {
    flex: 1 1 0;
    max-width: 90px;
    min-height: 56px;
    border: none;
    border-radius: 12px;
    background: rgba(15, 23, 42, 0.6);
    border: 2px solid #475569;
    font-size: clamp(1.5rem, 2.8vw, 2.4rem);
    font-family: inherit;
    cursor: pointer;
    touch-action: none;
  }
  .choice.shake { animation: shake 0.25s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(3px);
    border-radius: 14px;
    cursor: pointer;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .hidden { display: none; }
  .overlay .title { font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 800; }
  .overlay .result {
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(--cell-back);
    font-variant-numeric: tabular-nums;
  }
  .overlay .sub { color: #94a3b8; font-size: 0.9rem; text-align: center; padding: 0 8px; }
  .overlay .newrecord {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .overlay .big {
    background: var(--accent);
    color: var(--text-dark);
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .overlay .tap { color: #64748b; font-size: 0.75rem; }
  /* players=1: 좁은 단독 뷰포트(iframe, ≈25% 폭)용 오버라이드 — vw 항을 약 4배로 재조정 */
  .players-1 .hud .value { font-size: clamp(0.9rem, 6.4vw, 1.3rem); }
  .players-1 .prompt { font-size: clamp(0.95rem, 6.8vw, 1.3rem); }
  .players-1 .seq { min-height: clamp(34px, 13.6vw, 52px); }
  .players-1 .tok {
    width: clamp(34px, 13.6vw, 52px);
    height: clamp(34px, 13.6vw, 52px);
    font-size: clamp(1.3rem, 9.6vw, 2rem);
  }
  .players-1 .choice { font-size: clamp(1.5rem, 11.2vw, 2.4rem); }
  .players-1 .overlay .title { font-size: clamp(1.2rem, 10vw, 2rem); }
  .players-1 .overlay .result { font-size: clamp(1.6rem, 14vw, 2.8rem); }
  .players-1 .overlay .big { font-size: clamp(1rem, 7.2vw, 1.2rem); }
</style>
</head>
<body>

<div id="games"></div>

<script>
(() => {
  const BEST_KEY = 'pattern-next-best';
  const TOTAL = 10;
  const PLAYERS = Math.max(1, Math.min(6, parseInt(new URLSearchParams(location.search).get('players'), 10) || 4));

  /* ?players= 없이 열면 인원수 선택(1·2·6인용)부터 — 고르면 그 인원으로 다시 연다 */
  if (!new URLSearchParams(location.search).has('players')) {
    const sel = document.createElement('div');
    sel.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:14px;padding:0 16px 6vh;background:rgba(15,23,42,0.97);color:#e2e8f0;';
    sel.innerHTML = '<div style="font-size:clamp(1.3rem,3vw,2.2rem);font-weight:800;">몇 명이서 할까요?</div>'
      + '<div style="display:flex;gap:12px;width:100%;max-width:720px;">'
      + [1, 2, 6].map(n => '<button data-p="' + n + '" style="flex:1;border:none;border-radius:14px;background:#38bdf8;color:#0f172a;font-family:inherit;font-weight:800;font-size:clamp(1rem,2.4vw,1.6rem);padding:clamp(14px,3vh,26px) 4px;cursor:pointer;touch-action:none;">' + n + '인용</button>').join('')
      + '</div>';
    document.body.appendChild(sel);
    sel.addEventListener('pointerdown', e => {
      const btn = e.target.closest('[data-p]');
      if (btn) location.search = 'players=' + btn.dataset.p;
    });
  }
  document.body.classList.add('players-' + PLAYERS);
  const TOKENS = ['🔴', '🔵', '🟡', '🟢', '🟣', '⭐', '🌙', '☀️', '🍎', '🍌'];
  /* 규칙 유형: 주기 패턴 (0,1,2 = 그 문제에 뽑힌 토큰 인덱스) */
  const RULES = [
    [0, 1],          /* ABAB */
    [0, 0, 1, 1],    /* AABB */
    [0, 1, 2],       /* ABC  */
    [0, 1, 1]        /* ABB  */
  ];

  /* 우클릭 및 롱프레스 컨텍스트 메뉴 차단 */
  document.addEventListener('contextmenu', e => e.preventDefault());
  /* 드래그/텍스트 선택으로 인한 입력 방해 차단 */
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function loadBest() {
    const b = localStorage.getItem(BEST_KEY);
    return b ? Number(b) : null;
  }

  function formatTime(ms) {
    return (ms / 1000).toFixed(2);
  }

  /* 문제 생성: 토큰 3개 뽑고 규칙에 따라 6~8칸 나열, 마지막 칸이 정답 */
  function makeProblem() {
    const rule = RULES[Math.floor(Math.random() * RULES.length)];
    const toks = shuffle(TOKENS.slice()).slice(0, 3); /* 문제당 3개 (보기용 포함) */
    const len = 6 + Math.floor(Math.random() * 3);    /* 6~8 */
    const seq = [];
    for (let i = 0; i < len; i++) seq.push(toks[rule[i % rule.length]]);
    const answer = seq[len - 1];
    const choices = shuffle(toks.slice()); /* 정답 + 그 문제의 다른 토큰들, 중복 없음 */
    return { seq, answer, choices };
  }

  function createGame(root, index) {
    root.className = 'game';
    root.innerHTML = `
      <h2>${PLAYERS === 1 ? '' : 'PLAYER ' + (index + 1) + ' · '}규칙 <span>찾기</span></h2>
      <div class="hud">
        <div class="box"><div class="label">진행</div><div class="value prog">0/${TOTAL}</div></div>
        <div class="box"><div class="label">시간</div><div class="value time">0.00</div></div>
        <div class="box"><div class="label">최고</div><div class="value best">-</div></div>
      </div>
      <div class="prompt">다음에 올 것은 <span>무엇</span>일까요?</div>
      <div class="seq"></div>
      <div class="choices"></div>
      <div class="overlay">
        <div class="title">규칙 찾기</div>
        <div class="result hidden"></div>
        <div class="newrecord" style="display:none">🎉 신기록!</div>
        <div class="sub">규칙을 찾아 다음에 올 것을 골라요!</div>
        <button class="big">게임 시작</button>
        <div class="tap">화면 아무 곳이나 터치해도 시작</div>
      </div>`;

    const seqEl = root.querySelector('.seq');
    const choicesEl = root.querySelector('.choices');
    const progEl = root.querySelector('.value.prog');
    const timerEl = root.querySelector('.value.time');
    const bestEl = root.querySelector('.value.best');
    const overlay = root.querySelector('.overlay');
    const overlayTitle = overlay.querySelector('.title');
    const overlayResult = overlay.querySelector('.result');
    const overlayRecord = overlay.querySelector('.newrecord');
    const overlaySub = overlay.querySelector('.sub');
    const startBtn = overlay.querySelector('.big');

    let problem = null;
    let solved = 0;
    let startTime = 0;
    let timerId = null;
    let playing = false;
    let locked = false; /* 정답 연출 중 입력 잠금 */
    let fillTimer = null;

    function refreshBest() {
      const b = loadBest();
      bestEl.textContent = b !== null ? b.toFixed(2) : '-';
    }

    function tick() {
      timerEl.textContent = formatTime(performance.now() - startTime);
    }

    function renderProblem() {
      problem = makeProblem();
      seqEl.innerHTML = '';
      problem.seq.forEach((t, i) => {
        const d = document.createElement('div');
        if (i === problem.seq.length - 1) {
          d.className = 'tok slot';
          d.textContent = '?';
        } else {
          d.className = 'tok';
          d.textContent = t;
        }
        seqEl.appendChild(d);
      });
      choicesEl.innerHTML = '';
      problem.choices.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = t;
        choicesEl.appendChild(btn);
      });
    }

    function onChoice(btn) {
      if (!playing || locked) return;
      if (btn.textContent !== problem.answer) {
        btn.classList.remove('shake');
        void btn.offsetWidth; /* 애니메이션 재시작 트릭 */
        btn.classList.add('shake');
        return;
      }
      /* ?가 채워지는 연출 후 다음 문제 */
      const slot = seqEl.querySelector('.slot');
      slot.textContent = problem.answer;
      slot.classList.add('filled');
      solved++;
      progEl.textContent = solved + '/' + TOTAL;
      if (solved >= TOTAL) return finish();
      locked = true;
      clearTimeout(fillTimer);
      fillTimer = setTimeout(() => {
        locked = false;
        renderProblem();
      }, 550);
    }

    /* pointerdown 위임: 손가락이 닿는 순간 처리 */
    choicesEl.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return; /* 마우스는 좌클릭만 */
      const btn = e.target.closest('.choice');
      if (!btn) return;
      e.preventDefault(); /* 합성 click/더블탭 줌 등 후속 이벤트 방지 */
      onChoice(btn);
    });

    function start() {
      solved = 0;
      locked = false;
      clearTimeout(fillTimer);
      progEl.textContent = '0/' + TOTAL;
      timerEl.textContent = '0.00';
      refreshBest();
      renderProblem();
      overlay.classList.add('hidden');
      playing = true;
      startTime = performance.now();
      clearInterval(timerId);
      timerId = setInterval(tick, 31);
    }

    function finish() {
      playing = false;
      clearInterval(timerId);
      clearTimeout(fillTimer);
      const elapsed = performance.now() - startTime;
      timerEl.textContent = formatTime(elapsed);

      const prevBest = loadBest();
      const secs = elapsed / 1000;
      const isRecord = prevBest === null || secs < prevBest;
      if (isRecord) localStorage.setItem(BEST_KEY, secs.toFixed(2));
      refreshBest();

      overlayTitle.textContent = '완료!';
      overlayResult.textContent = secs.toFixed(2) + '초';
      overlayResult.classList.remove('hidden');
      overlayRecord.style.display = isRecord ? 'block' : 'none';
      overlaySub.textContent = isRecord ? '' : '최고 기록: ' + loadBest().toFixed(2) + '초';
      startBtn.textContent = '다시 하기';
      overlay.classList.remove('hidden');
    }

    /* 오버레이 전체가 시작 버튼: 끝난 즉시 아무 곳이나 눌러 재시작 */
    overlay.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      start();
    });

    refreshBest();
    renderProblem(); /* 시작 전 미리보기 */
  }

  const container = document.getElementById('games');
  for (let i = 0; i < PLAYERS; i++) {
    const panel = document.createElement('div');
    container.appendChild(panel);
    createGame(panel, i);
  }
})();
</script>
</body>
</html>
