<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0f172a"/>
  <!-- 주사위 -->
  <rect x="12" y="26" width="46" height="46" rx="10" fill="#38bdf8" transform="rotate(-8 35 49)"/>
  <g fill="#0f172a" transform="rotate(-8 35 49)">
    <circle cx="24" cy="38" r="4.5"/>
    <circle cx="46" cy="38" r="4.5"/>
    <circle cx="35" cy="49" r="4.5"/>
    <circle cx="24" cy="60" r="4.5"/>
    <circle cx="46" cy="60" r="4.5"/>
  </g>
  <!-- 숫자 2 카드 -->
  <rect x="50" y="46" width="40" height="40" rx="9" fill="#f43f5e" transform="rotate(10 70 66)"/>
  <text x="70" y="76" font-family="Segoe UI, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" transform="rotate(10 70 66)">2</text>
