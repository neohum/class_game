<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로켓 수학 × 4</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell-front: #38bdf8;
    --cell-front-hover: #7dd3fc;
    --cell-back: #fbbf24;
    --cell-back-hover: #fcd34d;
    --text-dark: #0f172a;
    --text-light: #e2e8f0;
    --accent: #34d399;
    --wrong: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text-light);
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;      /* 스크롤/줌 제스처 판정 지연 제거 → 터치 즉시 반응 */
    overflow: hidden;
  }
  #games {
    display: flex;
    height: 100vh;
    gap: 8px;
    padding: 8px;
  }
  .game {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    background: var(--panel);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    overflow: hidden;
  }
  .game h2 {
    font-size: 1rem;
    letter-spacing: 1px;
    margin-top: auto; /* 제목·HUD·보드를 패널 바닥 쪽으로 밀어내림 */
    margin-bottom: 6px;
    color: #94a3b8;
  }
  .game h2 span { color: var(--wrong); }
  .hud {
    display: flex;
    gap: 6px;
    align-items: stretch;
    margin-bottom: 8px;
    width: 100%;
    justify-content: center;
  }
  .hud .box {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 8px;
    padding: 4px 10px;
    text-align: center;
    min-width: 0;
    flex: 1 1 0;
    max-width: 110px;
  }
  .hud .label {
    font-size: 0.6rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .hud .value {
    font-size: clamp(0.9rem, 1.6vw, 1.3rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hud .value.prog { color: var(--accent); }
  .play {
    display: flex;
    gap: 10px;
    align-items: stretch;
    width: 100%;
    max-width: min(21vw, 50vh);
    height: min(42vh, 400px);
    margin-bottom: 4px;
  }
  .track {
    position: relative;
    width: clamp(30px, 3vw, 44px);
    flex: none;
    border-radius: 10px;
    background:
      repeating-linear-gradient(to top,
        rgba(148, 163, 184, 0.35) 0, rgba(148, 163, 184, 0.35) 2px,
        transparent 2px, transparent 10%),
      rgba(15, 23, 42, 0.6);
    overflow: visible;
  }
  .rocket {
    position: absolute;
    left: 50%;
    bottom: 2px;
    font-size: clamp(1.3rem, 2.2vw, 1.9rem);
    line-height: 1;
    transform: translate(-50%, 0);
    transition: transform 0.3s ease-out;
    will-change: transform;
    z-index: 2;
    pointer-events: none;
  }
  .rocket.launch {
    transition: transform 0.75s cubic-bezier(0.6, 0, 1, 1), opacity 0.75s;
    opacity: 0;
  }
  .main {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
  }
  .problem {
    margin: auto 0;
    text-align: center;
    font-size: clamp(1.7rem, 3.4vw, 3rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
  }
  .choice {
    border: none;
    border-radius: 12px;
    background: var(--cell-front);
    color: var(--text-dark);
    min-height: clamp(48px, 8vh, 70px);
    font-size: clamp(1.2rem, 2.2vw, 1.9rem);
    font-weight: 800;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    touch-action: none;
    transition: background 0.15s;
  }
  .choice:hover { background: var(--cell-front-hover); }
  .choice.shake { animation: shake 0.25s; background: var(--wrong); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(3px);
    border-radius: 14px;
    cursor: pointer;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .hidden { display: none; }
  .overlay .title { font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 800; text-align: center; }
  .overlay .result {
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(--cell-back);
    font-variant-numeric: tabular-nums;
  }
  .overlay .sub { color: #94a3b8; font-size: 0.9rem; text-align: center; padding: 0 10px; }
  .overlay .newrecord {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .overlay .big {
    background: var(--accent);
    color: var(--text-dark);
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .overlay .tap { color: #64748b; font-size: 0.75rem; }
  /* players=1: 좁은 단독 뷰포트(iframe, ≈25% 폭)용 오버라이드 — vw 항을 약 4배(또는 %)로 재조정 */
  .players-1 .hud .value { font-size: clamp(0.9rem, 6.4vw, 1.3rem); }
  .players-1 .play { max-width: min(84%, 50vh); }
  .players-1 .track { width: clamp(30px, 12vw, 44px); }
  .players-1 .rocket { font-size: clamp(1.3rem, 8.8vw, 1.9rem); }
  .players-1 .problem { font-size: clamp(1.7rem, 13.6vw, 3rem); }
  .players-1 .choice { font-size: clamp(1.2rem, 8.8vw, 1.9rem); }
  .players-1 .overlay .title { font-size: clamp(1.2rem, 10vw, 2rem); }
  .players-1 .overlay .result { font-size: clamp(1.6rem, 14vw, 2.8rem); }
  .players-1 .overlay .big { font-size: clamp(1rem, 7.2vw, 1.2rem); }
</style>
</head>
<body>

<div id="games"></div>

<script>
(() => {
  const BEST_KEY = 'rocket-math-best';
  const TOTAL = 10;
  const PLAYERS = Math.max(1, Math.min(6, parseInt(new URLSearchParams(location.search).get('players'), 10) || 4));

  /* ?players= 없이 열면 인원수 선택(1·2·6인용)부터 — 고르면 그 인원으로 다시 연다 */
  if (!new URLSearchParams(location.search).has('players')) {
    const sel = document.createElement('div');
    sel.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:14px;padding:0 16px 6vh;background:rgba(15,23,42,0.97);color:#e2e8f0;';
    sel.innerHTML = '<div style="font-size:clamp(1.3rem,3vw,2.2rem);font-weight:800;">몇 명이서 할까요?</div>'
      + '<div style="display:flex;gap:12px;width:100%;max-width:720px;">'
      + [1, 2, 6].map(n => '<button data-p="' + n + '" style="flex:1;border:none;border-radius:14px;background:#38bdf8;color:#0f172a;font-family:inherit;font-weight:800;font-size:clamp(1rem,2.4vw,1.6rem);padding:clamp(14px,3vh,26px) 4px;cursor:pointer;touch-action:none;">' + n + '인용</button>').join('')
      + '</div>';
    document.body.appendChild(sel);
    sel.addEventListener('pointerdown', e => {
      const btn = e.target.closest('[data-p]');
      if (btn) location.search = 'players=' + btn.dataset.p;
    });
  }
  document.body.classList.add('players-' + PLAYERS);

  /* 우클릭 및 롱프레스 컨텍스트 메뉴 차단 */
  document.addEventListener('contextmenu', e => e.preventDefault());
  /* 드래그/텍스트 선택으로 인한 입력 방해 차단 */
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function ri(n) { return Math.floor(Math.random() * n); }

  function loadBest() {
    const b = localStorage.getItem(BEST_KEY);
    return b ? Number(b) : null;
  }

  function formatTime(ms) {
    return (ms / 1000).toFixed(2);
  }

  /* 받아올림 덧셈 또는 받아내림 뺄셈 문제 */
  function genProblem() {
    if (Math.random() < 0.5) {
      /* a + b, a·b ∈ 2~9, a+b ≥ 11 */
      const a = 2 + ri(8);
      const lo = Math.max(2, 11 - a);
      const b = lo + ri(9 - lo + 1);
      return { text: a + ' + ' + b, ans: a + b };
    }
    /* m − s, m ∈ 11~18, s ∈ (m−9)~9 → 받아내림 발생 */
    const m = 11 + ri(8);
    const lo = m - 9;
    const s = lo + ri(9 - lo + 1);
    return { text: m + ' − ' + s, ans: m - s };
  }

  /* 오답 3개: 정답 ±1~3 근접 오답, 1 이상, 중복 없음 */
  function pickWrongs(ans) {
    const cands = shuffle([ans - 1, ans + 1, ans - 2, ans + 2, ans - 3, ans + 3]
      .filter(x => x >= 1));
    return cands.slice(0, 3);
  }

  function createGame(root, index) {
    root.className = 'game';
    root.innerHTML = `
      <h2>${PLAYERS === 1 ? '' : 'PLAYER ' + (index + 1) + ' · '}<span>로켓</span> 수학</h2>
      <div class="hud">
        <div class="box"><div class="label">진행</div><div class="value prog">0/${TOTAL}</div></div>
        <div class="box"><div class="label">시간</div><div class="value time">0.00</div></div>
        <div class="box"><div class="label">최고</div><div class="value best">-</div></div>
      </div>
      <div class="play">
        <div class="track"><div class="rocket">🚀</div></div>
        <div class="main">
          <div class="problem">8 + 7</div>
          <div class="choices"></div>
        </div>
      </div>
      <div class="overlay">
        <div class="title">로켓 수학</div>
        <div class="result hidden"></div>
        <div class="newrecord" style="display:none">🎉 신기록!</div>
        <div class="sub">정답을 맞히면 로켓이 올라가요! ${TOTAL}번 맞히면 발사!</div>
        <button class="big">게임 시작</button>
        <div class="tap">화면 아무 곳이나 터치해도 시작</div>
      </div>`;

    const trackEl = root.querySelector('.track');
    const rocketEl = root.querySelector('.rocket');
    const problemEl = root.querySelector('.problem');
    const choicesEl = root.querySelector('.choices');
    const progEl = root.querySelector('.value.prog');
    const timerEl = root.querySelector('.value.time');
    const bestEl = root.querySelector('.value.best');
    const overlay = root.querySelector('.overlay');
    const overlayTitle = overlay.querySelector('.title');
    const overlayResult = overlay.querySelector('.result');
    const overlayRecord = overlay.querySelector('.newrecord');
    const overlaySub = overlay.querySelector('.sub');
    const startBtn = overlay.querySelector('.big');

    const choiceBtns = [];
    for (let i = 0; i < 4; i++) {
      const b = document.createElement('button');
      b.className = 'choice';
      choicesEl.appendChild(b);
      choiceBtns.push(b);
    }

    let done = 0;
    let answer = 0;
    let startTime = 0;
    let timerId = null;
    let playing = false;

    function refreshBest() {
      const b = loadBest();
      bestEl.textContent = b !== null ? b.toFixed(2) : '-';
    }

    function tick() {
      timerEl.textContent = formatTime(performance.now() - startTime);
    }

    /* 로켓 위치: 0/10(바닥) → 10/10(꼭대기) */
    function updateRocket(p) {
      const usable = Math.max(0, trackEl.clientHeight - rocketEl.offsetHeight - 4);
      rocketEl.style.transform = 'translate(-50%, ' + (-usable * p / TOTAL) + 'px)';
    }

    function makeProblem() {
      const q = genProblem();
      answer = q.ans;
      problemEl.textContent = q.text;
      const opts = shuffle([answer, ...pickWrongs(answer)]);
      choiceBtns.forEach((b, i) => {
        b.textContent = opts[i];
        b.dataset.val = opts[i];
        b.classList.remove('shake');
      });
    }

    function onChoice(btn) {
      if (!playing) return;
      if (Number(btn.dataset.val) !== answer) {
        btn.classList.remove('shake');
        void btn.offsetWidth; /* 애니메이션 재시작 트릭 */
        btn.classList.add('shake');
        return;
      }

      done++;
      progEl.textContent = done + '/' + TOTAL;
      updateRocket(done);

      if (done >= TOTAL) {
        const elapsed = performance.now() - startTime;
        clearInterval(timerId);
        timerEl.textContent = formatTime(elapsed);
        playing = false;
        launch(elapsed);
      } else {
        makeProblem();
      }
    }

    /* 발사 연출: 로켓이 빠르게 위로 사라진 뒤 결과 오버레이 */
    function launch(elapsed) {
      rocketEl.classList.add('launch');
      rocketEl.style.transform = 'translate(-50%, ' + (-window.innerHeight) + 'px)';
      setTimeout(() => finish(elapsed), 750);
    }

    /* pointerdown 위임: 손가락이 닿는 순간 처리 (멀티터치에서도 포인터마다 독립 발생) */
    choicesEl.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return; /* 마우스는 좌클릭만 */
      const btn = e.target.closest('.choice');
      if (!btn) return;
      e.preventDefault(); /* 합성 click/더블탭 줌 등 후속 이벤트 방지 */
      onChoice(btn);
    });

    function start() {
      done = 0;
      progEl.textContent = '0/' + TOTAL;
      timerEl.textContent = '0.00';
      refreshBest();
      rocketEl.classList.remove('launch');
      rocketEl.style.opacity = '';
      updateRocket(0);
      makeProblem();
      overlay.classList.add('hidden');
      playing = true;
      startTime = performance.now();
      clearInterval(timerId);
      timerId = setInterval(tick, 31);
    }

    function finish(elapsed) {
      const prevBest = loadBest();
      const secs = elapsed / 1000;
      const isRecord = prevBest === null || secs < prevBest;
      if (isRecord) localStorage.setItem(BEST_KEY, secs.toFixed(2));
      refreshBest();

      overlayTitle.textContent = '발사 성공! 🚀';
      overlayResult.textContent = secs.toFixed(2) + '초';
      overlayResult.classList.remove('hidden');
      overlayRecord.style.display = isRecord ? 'block' : 'none';
      overlaySub.textContent = isRecord ? '' : '최고 기록: ' + loadBest().toFixed(2) + '초';
      startBtn.textContent = '다시 하기';
      overlay.classList.remove('hidden');
    }

    /* 오버레이 전체가 시작 버튼: 이 패널만 시작/재시작 */
    overlay.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      start();
    });

    refreshBest();
    makeProblem(); /* 시작 전 미리보기 */
  }

  const container = document.getElementById('games');
  for (let i = 0; i < PLAYERS; i++) {
    const panel = document.createElement('div');
    container.appendChild(panel);
    createGame(panel, i);
  }
})();
</script>
</body>
</html>
