<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소리 비행기 (Voice Flight) - 메인 메뉴</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="start-screen" class="screen active">
                <a href="/" style="position: absolute; top: 20px; left: 20px; padding: 12px 24px; background: #FF9F43; color: white; border-radius: 25px; text-decoration: none; font-weight: bold; font-family: 'Jua', sans-serif; font-size: 1.2rem; box-shadow: 0 5px 0 #E67E22; z-index: 1000; border: 3px solid #fff;">🏠 허브로 돌아가기</a>
                
                <div class="logo">
                    <div class="logo-icon">🔊✈️</div>
                    <h1>소리 비행기</h1>
                </div>
                <p>마이크의 소리 크기로 비행기를 조종하세요!<br>아래에서 원하는 비행 모드를 <strong>클릭하면 바로 게임이 시작</strong>됩니다.</p>
                
                <div class="buttons" style="display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 350px; margin: 0 auto;">
                    <button type="button" onclick="window.location.href='practice.html'" style="font-size: 1.2rem; padding: 15px 20px; background: #3498db; box-shadow: 0 5px 0 #2980b9;">🎈 연습 모드 (자유 비행)</button>
                    <button type="button" onclick="window.location.href='mountain.html'" style="font-size: 1.2rem; padding: 15px 20px; background: #2ecc71; box-shadow: 0 5px 0 #27ae60;">⛰️ 산맥 비행 (기본)</button>
                    <button type="button" onclick="window.location.href='cave.html'" style="font-size: 1.2rem; padding: 15px 20px; background: #9b59b6; box-shadow: 0 5px 0 #8e44ad;">🦇 동굴 비행 (심화)</button>
                    <button type="button" onclick="window.location.href='sky.html'" style="font-size: 1.2rem; padding: 15px 20px; background: #e67e22; box-shadow: 0 5px 0 #d35400;">☁️ 하늘 비행 (비구름)</button>
                </div>

                <p class="warning" style="margin-top: 20px;">※ 마이크 권한을 허용해야 게임이 진행됩니다.</p>
            </div>
        </div>
    </div>
</body>
</html>
